feature:
  type: brisk

dataset:
  images_dirs:
    - /home/a.lunawat/data/Samoa202509/RAW_DATA/r20251003_212212_SC46_sav5_15to40/preprocessed/images-AC
    - /home/a.lunawat/data/Samoa202509/RAW_DATA/r20251003_212212_SC46_sav5_15to40/preprocessed/images-FC
    - /home/a.lunawat/data/Samoa202509/RAW_DATA/r20250927_195953_SC21_nw1_25to40/preprocessed/images-AC
    - /home/a.lunawat/data/Samoa202509/RAW_DATA/r20250927_195953_SC21_nw1_25to40/preprocessed/images-FC
    - /home/a.lunawat/data/SolomonIslands2025/RAW_DATA/r20250708_032211_SC64_lughughi_40to60/preprocessed/images-AC
    - /home/a.lunawat/data/SolomonIslands2025/RAW_DATA/r20250708_032211_SC64_lughughi_40to60/preprocessed/images-FC
  recursive: true
  max_images: 0
  extensions: [png, jpg, jpeg, bmp, tiff]

image_prep:
  scale: 1.0         # resize factor applied after CLAHE (0.5 = half res); 1.0 = no resize
  clahe:
    enabled: false
    clip_limit: 2.0
    tile_grid_size: 8

brisk:
  thresh: 30
  octaves: 3
  pattern_scale: 1.0

trainer:
  k: 10
  L: 6
  nthreads: 8
  max_iters: 0
  # BRISK descriptors are 64 bytes each (binary). Memory pressure is similar to ORB.
  max_features_per_image: 2000
  max_total_descriptors: 20000000

output:
  vocab_path: /home/a.lunawat/data/vocabulary/brisk_voc_uw.fbow

test:
  enabled: true
  max_images: 5
  top_k: 10
  output_file: /path/to/output/brisk_voc_test.csv
