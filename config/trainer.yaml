feature:
  # Valid values: orb, brisk
  type: orb

dataset:
  # One or more directories containing images (recursively by default).
  # Use images_dirs (list) to specify multiple directories, or images_dir
  # (single string) for backward compatibility with a single directory.
  images_dirs:
    - /path/to/images
  # images_dir: /path/to/images   # single-directory shorthand (also accepted)
  recursive: true
  # Optional cap to speed up training.
  max_images: 0
  extensions: [png, jpg, jpeg, bmp, tiff]

orb:
  # ORB extractor params (OpenCV cv::ORB::create argument mapping).
  nfeatures: 2000
  scale_factor: 1.2
  nlevels: 8
  edge_threshold: 31
  first_level: 0
  wta_k: 2
  score_type: 0
  patch_size: 31
  fast_threshold: 20

brisk:
  # BRISK extractor params (OpenCV cv::BRISK::create argument mapping).
  thresh: 30
  octaves: 3
  pattern_scale: 1.0

trainer:
  # fbow vocabulary parameters (k-ary tree branching factor and depth).
  k: 10
  L: 6
  # Number of threads to use in vocabulary creation.
  nthreads: 1
  # Maximum number of k-means iterations per level (0 = no iterations).
  # If omitted, fbow uses its internal default.
  max_iters: 0
  # Optional cap: limit descriptors per image (0 means no cap).
  max_features_per_image: 0
  # Optional cap: limit total descriptors across all images (0 means no cap).
  # Budget is distributed evenly so memory is bounded upfront, independent of
  # dataset size. Takes the min with max_features_per_image when both are set.
  max_total_descriptors: 0

output:
  # Output fbow vocabulary file (binary).
  vocab_path: vocab/orb_voc.fbow

test:
  # Reload the saved vocabulary and run a small transform test on a few images.
  enabled: true
  max_images: 5
  top_k: 10
  output_file: vocab/orb_voc_test.csv

